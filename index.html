<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>PMO Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#0b1220;
    color:white;
    overflow-x:hidden;
}

/* ===== BACKGROUND ===== */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left,#2563eb 0%,transparent 40%),
    radial-gradient(circle at bottom right,#7c3aed 0%,transparent 40%);
    opacity:.5;
    z-index:-2;
}

body::after{
    content:'';
    position:fixed;
    inset:0;
    backdrop-filter:blur(90px);
    z-index:-1;
}

/* ===== NAV ===== */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 8%;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:700;
}

.logo span{
    color:#60a5fa;
}

.nav-links a{
    color:#cbd5e1;
    margin-left:25px;
    text-decoration:none;
}

/* ===== HERO ===== */
.hero{
    min-height:90vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 20px;
}

.hero h1{
    font-size:60px;
    line-height:1.1;
}

.hero span{
    background:linear-gradient(90deg,#60a5fa,#a78bfa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    margin-top:20px;
    color:#cbd5e1;
    font-size:20px;
}

/* ===== BUTTONS ===== */
.buttons{
    margin-top:35px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    padding:14px 28px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    font-size:15px;
}

.primary{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    box-shadow:0 10px 30px rgba(37,99,235,.4);
}

.secondary{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    color:white;
}

/* ===== FEATURES ===== */
.section{
    padding:100px 8%;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    padding:25px;
    border-radius:20px;
}

/* ===== COPILOT MODAL ===== */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.modal-content{
    width:90%;
    max-width:900px;
    height:80vh;
    background:#0f172a;
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.1);
    display:flex;
    flex-direction:column;
}

.modal-header{
    padding:15px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,.1);
}

.close{
    cursor:pointer;
    font-size:18px;
}

/* iframe COPILOT */
iframe{
    flex:1;
    border:none;
}

/* ===== FOOTER ===== */
footer{
    text-align:center;
    padding:40px;
    color:#94a3b8;
}

</style>
</head>

<body>

<nav>
<div class="logo">PMO<span>Assistant</span></div>

<div class="nav-links">
<a href="#features">Funkcje</a>
<a href="#about">O projekcie</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div>
    <h1>Twój <span>PMO Assistant</span></h1>

    <p>AI które zarządza ryzykami, harmonogramem i projektami</p>

    <div class="buttons">

        <button class="btn primary" onclick="openCopilot()">
            Uruchom czat AI
        </button>

        <button class="btn secondary" onclick="scrollToFeatures()">
            Zobacz funkcje
        </button>

    </div>
</div>
</section>

<!-- FEATURES -->
<section class="section" id="features">

<h2 style="text-align:center;margin-bottom:40px;">Funkcje PMO</h2>

<div class="cards">

<div class="card">📅 Harmonogramy</div>
<div class="card">⚠️ Ryzyka</div>
<div class="card">📊 Raporty</div>
<div class="card">🤖 AI Copilot</div>

</div>

</section>

<!-- FOOTER -->
<footer>
© 2026 PMO Assistant
</footer>

<!-- ===== COPILOT MODAL ===== -->
<div class="modal" id="copilotModal">

<div class="modal-content">

<div class="modal-header">
<span>PMO AI Assistant</span>
<span class="close" onclick="closeCopilot()">✖</span>
</div>

<iframe
src="https://copilotstudio.microsoft.com/environments/b024a921-1128-e4ca-8979-c4e800a43a50/bots/pmo_PMOAgent/webchat?__version__=2">
</iframe>

</div>

</div>

<!-- ===== JS ===== -->
<script>

function openCopilot(){
    document.getElementById('copilotModal').style.display='flex';
}

function closeCopilot(){
    document.getElementById('copilotModal').style.display='none';
}

function scrollToFeatures(){
    document.getElementById('features')
    .scrollIntoView({behavior:'smooth'});
}

// zamykanie po kliknięciu tła
window.onclick = function(e){
    const modal = document.getElementById('copilotModal');
    if(e.target === modal){
        modal.style.display='none';
    }
}

</script>

</body>
</html>
